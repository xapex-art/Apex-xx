<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MINI - Ultimate Bot Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(15, 15, 20, 0.85);
            --primary: #00f0ff;
            --secondary: #0055ff;
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1128 0%, #000000 100%);
        }

        /* --- ANIMATED LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .cyber-circle {
            width: 100px; height: 100px;
            border: 4px solid transparent;
            border-top: 4px solid var(--primary);
            border-bottom: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .cyber-text {
            margin-top: 20px; font-weight: 900; letter-spacing: 5px;
            color: var(--primary); text-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        /* --- MAIN UI --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 100%; max-width: 450px;
            border-radius: 20px; padding: 40px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 85, 255, 0.2);
            text-align: center;
            transform: translateY(20px); opacity: 0;
            animation: fadeInUp 1s forwards 0.5s;
        }

        .brand-title {
            font-size: 2.5rem; font-weight: 900; font-style: italic;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stats-box {
            display: inline-block; background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 8px 15px; border-radius: 50px;
            font-size: 0.8rem; font-weight: 700; color: var(--primary);
            margin-bottom: 30px; letter-spacing: 1px;
        }
        .stats-box span { color: #fff; font-size: 1rem; margin-left: 5px;}

        input[type="tel"] {
            width: 100%; background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0, 240, 255, 0.2);
            padding: 20px; border-radius: 12px;
            color: var(--primary); font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem; font-weight: 700; text-align: center;
            letter-spacing: 2px; outline: none; transition: 0.3s;
            margin-bottom: 20px;
        }
        input[type="tel"]:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }

        .btn {
            width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: #000; border: none; padding: 18px; border-radius: 12px;
            font-size: 1rem; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; letter-spacing: 2px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }

        .code-box {
            margin-top: 25px; background: #000;
            border: 1px dashed var(--primary); border-radius: 12px;
            padding: 20px; font-family: 'JetBrains Mono', monospace;
            font-size: 2rem; color: #fff; text-shadow: 0 0 10px var(--primary);
            cursor: pointer; display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeInUp { to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="cyber-circle"></div>
        <div class="cyber-text">INITIALIZING APEX...</div>
    </div>

    <div class="card">
        <div class="brand-title">APEX MINI</div>
        <div class="stats-box">
            ACTIVE BOTS: <span id="activeCount">...</span>
        </div>

        <input type="tel" id="phoneInput" placeholder="947xxxxxxxx">
        <button class="btn" id="pairBtn" onclick="getPairingCode()">GENERATE PAIR CODE</button>
        
        <div class="code-box" id="codeBox" onclick="copyCode()"></div>
    </div>

    <script>
        // Remove loader after 2 seconds
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.visibility = 'hidden', 800);
            }, 1500);
            fetchStats();
            setInterval(fetchStats, 10000); // Update bot count every 10 seconds
        };

        async function fetchStats() {
            try {
                const res = await fetch('/stats');
                const data = await res.json();
                document.getElementById('activeCount').innerText = data.active;
            } catch (e) {
                document.getElementById('activeCount').innerText = 'OFFLINE';
            }
        }

        let currentCode = "";
        async function getPairingCode() {
            const input = document.getElementById('phoneInput');
            const btn = document.getElementById('pairBtn');
            const codeBox = document.getElementById('codeBox');
            const number = input.value.trim().replace(/[^0-9]/g, '');

            if (number.length < 7) return alert('Invalid number!');

            btn.innerText = 'GENERATING...'; btn.disabled = true;

            try {
                const res = await fetch(`/pair?number=${number}`);
                const data = await res.json();

                if (data.code) {
                    currentCode = data.code;
                    codeBox.innerText = data.code;
                    codeBox.style.display = 'block';
                    btn.innerText = 'CODE GENERATED';
                } else {
                    alert(data.error);
                    btn.innerText = 'TRY AGAIN'; btn.disabled = false;
                }
            } catch (err) {
                alert('Server error!');
                btn.innerText = 'GENERATE PAIR CODE'; btn.disabled = false;
            }
        }

        function copyCode() {
            if (!currentCode) return;
            navigator.clipboard.writeText(currentCode);
            document.getElementById('codeBox').innerText = 'COPIED!';
            setTimeout(() => document.getElementById('codeBox').innerText = currentCode, 2000);
        }
    </script>
</body>
</html>
