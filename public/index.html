<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MINI - High-Speed Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --bg-dark: #030712;
            --panel-bg: rgba(10, 15, 30, 0.75);
            --border-neon: rgba(0, 240, 255, 0.2);
            --text-white: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.06) 0%, transparent 40%);
        }

        /* ================= PREMIUM ANIME INTRO LOADER SCREEN ================= */
        #intro-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #02040a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.77, 0, 0.175, 1), visibility 0.8s;
        }

        .cyber-ring {
            width: 120px; height: 120px;
            border: 4px dashed var(--neon-blue);
            border-radius: 50%;
            animation: spinRing 3s linear infinite;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .cyber-ring::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px dotted var(--neon-pink);
            border-radius: 50%;
            animation: spinRingBack 1.5s linear infinite;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spinRingBack {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-top: 30px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ================= MAIN INTERFACE DASHBOARD ================= */
        .dashboard-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .dashboard-container.reveal {
            opacity: 1;
            transform: scale(1);
        }

        .main-card {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-neon);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            border-radius: 24px 24px 0 0;
        }

        .header-section { text-align: center; margin-bottom: 35px; }

        .logo-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
        .logo-glow span { color: var(--neon-pink); text-shadow: 0 0 15px rgba(ff, 0, 127, 0.6); }

        .sub-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #6b7280;
            letter-spacing: 3px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Live Monitor Row */
        .live-counter-badge {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .counter-label { font-size: 0.85rem; color: #9ca3af; letter-spacing: 1px; }
        .counter-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-blue);
            font-weight: 700;
        }

        /* Inputs and Interactive UI elements */
        .input-wrapper { position: relative; margin-bottom: 25px; }
        
        input[type="tel"] {
            width: 100%;
            background: rgba(5, 8, 16, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
        }
        input[type="tel"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
        }

        .cyber-btn {
            width: 100%;
            background: linear-gradient(135deg, #00b4db, #00223e);
            border: 1px solid var(--neon-blue);
            color: white;
            border-radius: 14px;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 25px rgba(0, 240, 255, 0.2);
        }
        .cyber-btn:hover {
            background: linear-gradient(135deg, var(--neon-pink), #400020);
            border-color: var(--neon-pink);
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.3);
            transform: translateY(-2px);
        }

        .output-zone { margin-top: 30px; }
        .terminal-box {
            background: #020408;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .code-txt {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-blue);
            letter-spacing: 4px;
        }

        .hint { font-size: 0.7rem; color: #4b5563; margin-top: 8px; text-align: center; letter-spacing: 1px; }

        .loader-dots {
            width: 24px; height: 24px;
            border: 3px solid transparent;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro-loader">
        <div class="cyber-ring"></div>
        <div class="loader-text">APEX MINI CORE</div>
    </div>

    <div class="dashboard-container" id="dash">
        <div class="main-card">
            <div class="header-section">
                <div class="logo-glow">APEX<span>MINI</span></div>
                <div class="sub-tag">Automated Synchronization Node</div>
            </div>

            <div class="live-counter-badge">
                <span class="counter-label">🌐 ACTIVE TERMINAL CLUSTERS</span>
                <span class="counter-value" id="activeCount">00</span>
            </div>

            <div class="input-wrapper">
                <input type="tel" id="phoneNumber" placeholder="947xxxxxxxx" maxlength="15">
            </div>

            <button class="cyber-btn" id="actionBtn" onclick="triggerPairing()">INITIALIZE PAIR LINK</button>

            <div class="output-zone">
                <div class="terminal-box" id="termBox" onclick="copyClipboard()">
                    <div id="visualCode" class="code-txt" style="opacity: 0.25;">--------</div>
                </div>
                <div class="hint" id="hintLabel">ENTER PHONE NUMBER WITH COUNTRY CODE FIRST</div>
            </div>
        </div>
    </div>

    <script>
        let fetchedPairCode = "";

        // Premium Loader execution timeout delay (Simulates hardware core loading)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('intro-loader');
                const dash = document.getElementById('dash');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                dash.classList.add('reveal');
            }, 2200);

            // Fetch live session tracking counter setup
            syncActiveCount();
            setInterval(syncActiveCount, 3000); // 3 තත්පරයෙන් තත්පරයට Auto-Update වෙනවා!
        });

        async function syncActiveCount() {
            try {
                const res = await fetch('/api/active-count');
                const data = await res.json();
                // Dynamic incremental counter formatting
                document.getElementById('activeCount').innerText = data.count < 10 ? '0' + data.count : data.count;
            } catch(e) {}
        }

        async function triggerPairing() {
            const input = document.getElementById('phoneNumber');
            const btn = document.getElementById('actionBtn');
            const display = document.getElementById('visualCode');
            const hint = document.getElementById('hintLabel');

            let num = input.value.trim().replace(/[^0-9]/g, '');
            if(num.length < 8) {
                alert('Invalid Cyber Target Sequence. Check number format.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loader-dots" style="margin: 0 auto;"></div>';
            display.style.opacity = "0.25";
            display.innerText = "--------";

            try {
                const response = await fetch(`/pair?number=${num}`);
                const data = await response.json();

                if(data.code) {
                    fetchedPairCode = data.code;
                    display.innerText = data.code;
                    display.style.opacity = "1";
                    display.style.color = "var(--neon-blue)";
                    hint.innerText = "LINK GENERATED. TAP THE BOX TO COPY ACCESS DECREE.";
                    hint.style.color = "var(--neon-blue)";
                } else {
                    hint.innerText = data.error || "Link Failure.";
                    hint.style.color = "var(--neon-pink)";
                }
            } catch(e) {
                hint.innerText = "Network execution error timeout.";
            } finally {
                btn.disabled = false;
                btn.innerText = "INITIALIZE PAIR LINK";
            }
        }

        function copyClipboard() {
            if(!fetchedPairCode) return;
            navigator.clipboard.writeText(fetchedPairCode).then(() => {
                const hint = document.getElementById('hintLabel');
                const box = document.getElementById('termBox');
                hint.innerText = "CODE COPIED TO SYSTEM CLIPBOARD NODE!";
                hint.style.color = "var(--neon-pink)";
                box.style.borderColor = "var(--neon-pink)";
                
                setTimeout(() => {
                    hint.innerText = "TAP THE BOX TO COPY ACCESS DECREE.";
                    hint.style.color = "var(--neon-blue)";
                    box.style.borderColor = "rgba(255,255,255,0.1)";
                }, 2500);
            });
        }
    </script>
</body>
</html>
